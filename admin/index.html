<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>АПБ Админ</title>
  <!-- PWA manifest -->
  <link rel="manifest" href="/apb-app/admin/manifest.json">
<link rel="apple-touch-icon" href="/apb-app/admin/apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="192x192" href="/apb-app/admin/icon-192.png">
<link rel="icon" type="image/png" sizes="512x512" href="/apb-app/admin/icon-512.png">
  <!-- Цвет темы для мобильных браузеров -->
  <meta name="theme-color" content="#3171af">
  <!-- TailwindCSS (быстрая стилизация) -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Дополнительный стиль для скроллбара (опционально) -->
  <style>
    .scrollbar-hide::-webkit-scrollbar { display: none; }
    .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
  </style>
</head>
<body class="bg-[#F2F2F2] font-sans antialiased">
  <div id="root"></div>

  <!-- Весь React-код выполняется как модуль -->
  <script type="module">
    // --- Импорты (CDN через esm.sh) ---
    import React, { useState, useEffect, useRef } from 'https://esm.sh/react@18.2.0';
    import { createRoot } from 'https://esm.sh/react-dom@18.2.0/client';
    import { initializeApp } from 'https://esm.sh/firebase/app@10.8.0';
    import { 
      getFirestore, 
      collection, 
      onSnapshot, 
      query 
    } from 'https://esm.sh/firebase/firestore@10.8.0';
    import { 
      Award, 
      Image as ImageIcon, 
      Sparkles, 
      X, 
      Download,
      Loader2,
      ChevronLeft,
      ChevronRight,
      Maximize2,
      Calendar,
      Share2      // не используется, но импорт оставлен для соответствия исходному коду
    } from 'https://esm.sh/lucide-react@0.378.0';

    // --- КОНФИГУРАЦИЯ (ваша, без изменений) ---
    const firebaseConfig = {
      apiKey: "AIzaSyDSrWUBYjqYpA6CgG-tn0B2E_h9HN2wgZ8",
      authDomain: "apbapp-862a2.firebaseapp.com",
      projectId: "apbapp-862a2",
      storageBucket: "apbapp-862a2.firebasestorage.app",
      messagingSenderId: "909828829367",
      appId: "1:909828829367:web:64aa085f80b59b95d5dd32",
      measurementId: "G-026CEF7FKV"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const apiKey = ""; // Ваш ключ Gemini (если нужен)

    const MONTHS = [
      "Январь", "Февраль", "Март", "Апрель", "Май", "Июнь",
      "Июль", "Август", "Сентябрь", "Октябрь", "Ноябрь", "Декабрь"
    ];

    // --- КОМПОНЕНТ APP (полностью ваш, без правок) ---
    function App() {
      const [data, setData] = useState([]);
      const [loading, setLoading] = useState(true);
      const [selectedCity, setSelectedCity] = useState('Все города');
      const [selectedDate, setSelectedDate] = useState({
        month: new Date().getMonth(),
        year: new Date().getFullYear()
      });
      const [lastEvent, setLastEvent] = useState('Ожидание обновлений...');
      const [modalMedia, setModalMedia] = useState(null); 
      const [aiAnalysis, setAiAnalysis] = useState("");
      const [isAnalyzing, setIsAnalyzing] = useState(false);
      const [errorInfo, setErrorInfo] = useState(null);
      const [fullscreenImage, setFullscreenImage] = useState(null);
      const [deferredPrompt, setDeferredPrompt] = useState(null);
      
      const scrollRef = useRef(null);

      // --- PWA: регистрация Service Worker и обработчик установки ---
      useEffect(() => {
        if ('serviceWorker' in navigator) {
          window.addEventListener('load', () => {
            navigator.serviceWorker.register('/sw.js')
              .then(reg => console.log('SW registered:', reg))
              .catch(err => console.log('SW registration failed:', err));
          });
        }

        window.addEventListener('beforeinstallprompt', (e) => {
          e.preventDefault();
          setDeferredPrompt(e);
        });
      }, []);

      const handleInstallClick = async () => {
        if (!deferredPrompt) return;
        deferredPrompt.prompt();
        const { outcome } = await deferredPrompt.userChoice;
        if (outcome === 'accepted') setDeferredPrompt(null);
      };

      // --- Остальные хуки и функции (полностью из вашего кода) ---
      useEffect(() => {
        const q = query(collection(db, 'evaluations'));
        const unsubscribe = onSnapshot(q, (snapshot) => {
          const evaluations = [];
          snapshot.forEach((doc) => {
            evaluations.push({ firestoreId: doc.id, ...doc.data() });
          });
          
          if (evaluations.length > 0) {
            const latest = evaluations[evaluations.length - 1];
            setLastEvent(`Судья ${latest.judgeName || '—'} оценил участника в номинации ${latest.discipline || '—'}`);
          }
          
          setData(evaluations);
          setLoading(false);
        }, (error) => console.error("Snapshot error:", error));
        return () => unsubscribe();
      }, []);

      useEffect(() => {
        if (scrollRef.current) {
          scrollRef.current.scrollTop = scrollRef.current.scrollHeight;
        }
      }, [data, selectedCity, selectedDate]);

      const getFilteredByDate = () => {
        return data.filter(item => {
          if (!item.timestamp) return false;
          const date = new Date(item.timestamp);
          return date.getMonth() === selectedDate.month && date.getFullYear() === selectedDate.year;
        });
      };

      const getFlatList = (sortByScore = false) => {
        const list = [];
        const filteredData = getFilteredByDate();
        
        filteredData.forEach(item => {
          if (item.participants && Array.isArray(item.participants)) {
            item.participants.forEach((p, pIdx) => {
              list.push({
                firestoreId: item.firestoreId,
                participantIdx: pIdx,
                number: p.number || '00',
                score: Number(p.score) || 0,
                place: 31 - (Number(p.score) || 0),
                judge: item.judgeName || '—',
                city: item.city || '—',
                comment: p.comment || '',
                photos: p.photos || [],
                discipline: item.discipline || '—',
                timestamp: item.timestamp || 0
              });
            });
          }
        });
        return sortByScore ? list.sort((a, b) => b.score - a.score) : list; 
      };

      const allEntriesRaw = getFlatList(false);
      const allEntriesRanked = getFlatList(true);
      const cities = ['Все города', ...new Set(allEntriesRaw.map(e => e.city))];
      
      const filteredLiveEntries = selectedCity === 'Все города' 
        ? allEntriesRaw 
        : allEntriesRaw.filter(e => e.city === selectedCity);

      const getNominationGroups = () => {
        const filteredRanked = selectedCity === 'Все города' 
          ? allEntriesRanked 
          : allEntriesRanked.filter(e => e.city === selectedCity);
        const groups = {};
        filteredRanked.forEach(p => {
          if (!groups[p.discipline]) groups[p.discipline] = [];
          groups[p.discipline].push(p);
        });
        return groups;
      };

      const analyzeComments = async (participantNumber, retryCount = 0) => {
        if (retryCount === 0) { setIsAnalyzing(true); setAiAnalysis(""); setErrorInfo(null); }
        const relevantComments = allEntriesRaw
          .filter(e => e.number === participantNumber && e.comment.trim().length > 0)
          .map(e => `Судья ${e.judge}: "${e.comment}"`).join("\n");

        if (!relevantComments) { setAiAnalysis("Недостаточно отзывов."); setIsAnalyzing(false); return; }

        try {
          const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              contents: [{ parts: [{ text: `Проанализируй отзывы судей об участнике №${participantNumber}. Напиши краткое резюме (2-3 предложения) на русском языке. Избегай капслока.\n\n${relevantComments}` }] }],
              systemInstruction: { parts: [{ text: "Ты эксперт-аналитик конкурса. Пиши грамотно, вежливо, используя обычный регистр." }] }
            })
          });
          if (!response.ok) {
            if ((response.status === 429 || response.status >= 500) && retryCount < 5) {
              setTimeout(() => analyzeComments(participantNumber, retryCount + 1), Math.pow(2, retryCount) * 1000);
              return;
            }
            throw new Error();
          }
          const result = await response.json();
          setAiAnalysis(result.candidates?.[0]?.content?.parts?.[0]?.text || "Текст не получен.");
        } catch (error) { setErrorInfo("Ошибка соединения."); } finally { if (retryCount === 0 || aiAnalysis || errorInfo) setIsAnalyzing(false); }
      };

      const changeMonth = (direction) => {
        setSelectedDate(prev => {
          let newMonth = prev.month + direction;
          let newYear = prev.year;
          if (newMonth > 11) { newMonth = 0; newYear++; }
          if (newMonth < 0) { newMonth = 11; newYear--; }
          return { month: newMonth, year: newYear };
        });
      };

      const openFullscreen = (index) => {
        if (!modalMedia) return;
        setFullscreenImage({
          url: modalMedia.photos[index],
          index: index
        });
      };

      const navigateFullscreen = (e, direction) => {
        e.stopPropagation();
        if (!modalMedia || !fullscreenImage) return;
        const newIndex = (fullscreenImage.index + direction + modalMedia.photos.length) % modalMedia.photos.length;
        setFullscreenImage({
          url: modalMedia.photos[newIndex],
          index: newIndex
        });
      };

      if (loading) return (
        <div className="min-h-screen bg-white flex items-center justify-center font-sans">
          <div className="text-black animate-pulse font-bold text-[10px] uppercase tracking-widest">Загрузка...</div>
        </div>
      );

      return (
        <div className="min-h-screen bg-[#F2F2F2] font-sans text-black select-none pb-10">
          
          {/* PWA Install Banner */}
          {deferredPrompt && (
            <div className="bg-[#3171af] text-white px-4 py-2 flex justify-between items-center text-[11px] font-bold animate-slide-down">
              <span>Установите приложение для быстрого доступа</span>
              <button onClick={handleInstallClick} className="bg-white text-[#3171af] px-3 py-1 rounded-full uppercase text-[9px]">Установить</button>
            </div>
          )}

          {/* Статус-остров */}
          <div className="sticky top-0 z-40 w-full pt-3 pb-4 px-3 flex justify-center bg-[#F2F2F2]/80 backdrop-blur-md">
            <div className="bg-black text-white px-5 py-2.5 rounded-[20px] shadow-lg w-full max-w-sm flex items-center gap-3 border border-white/10">
              <Sparkles size={14} className="text-[#3171af] shrink-0" />
              <div className="flex flex-col min-w-0">
                <span className="text-[8px] font-black text-[#3171af] tracking-wider uppercase">Статус</span>
                <span className="text-[11px] font-medium leading-tight truncate">{lastEvent}</span>
              </div>
            </div>
          </div>

          <div className="max-w-5xl mx-auto px-3 space-y-4">
            
            {/* Календарный фильтр */}
            <div className="flex items-center justify-between bg-white rounded-2xl p-3 border border-gray-100 shadow-sm">
              <div className="flex items-center gap-2 text-gray-400">
                <Calendar size={16} />
                <span className="text-[10px] font-black uppercase tracking-wider">Период</span>
              </div>
              <div className="flex items-center gap-4 bg-gray-50 rounded-xl px-2 py-1 border border-gray-100">
                <button onClick={() => changeMonth(-1)} className="p-1.5 hover:bg-white rounded-lg transition-colors text-gray-600"><ChevronLeft size={16} /></button>
                <div className="flex flex-col items-center min-w-[100px]">
                  <span className="text-[11px] font-black">{MONTHS[selectedDate.month]}</span>
                  <span className="text-[8px] font-bold text-[#3171af]">{selectedDate.year}</span>
                </div>
                <button onClick={() => changeMonth(1)} className="p-1.5 hover:bg-white rounded-lg transition-colors text-gray-600"><ChevronRight size={16} /></button>
              </div>
            </div>

            {/* Таблица */}
            <div className="bg-white rounded-[24px] shadow-sm p-4 border border-gray-100 overflow-hidden">
              <div className="flex justify-between items-center mb-3 px-1">
                <div className="flex flex-col">
                  <h2 className="text-[9px] font-bold text-gray-400 tracking-widest uppercase italic">Сводка результатов</h2>
                  <span className="text-[8px] text-gray-300 font-bold uppercase mt-0.5">Записей: {allEntriesRaw.length}</span>
                </div>
                <div className="flex items-center gap-1.5 bg-gray-50 px-2 py-0.5 rounded-full border border-gray-100">
                   <div className="w-1.5 h-1.5 bg-[#3171af] rounded-full animate-pulse" />
                   <span className="text-[8px] font-bold text-[#3171af]">PWA LIVE</span>
                </div>
              </div>

              <div className="overflow-x-auto scrollbar-hide relative border-t border-gray-50 pt-2">
                <div className="min-w-[800px]">
                  <div className="grid grid-cols-[50px_140px_60px_60px_100px_100px_1fr_60px] text-[8px] font-black text-gray-400 px-3 mb-2">
                    <div>№</div><div>НОМИНАЦИЯ</div><div>БАЛЛ</div><div>МЕСТО</div><div>СУДЬЯ</div><div>ГОРОД</div><div>КОММЕНТАРИЙ</div><div className="text-right">МЕДИА</div>
                  </div>
                  
                  <div ref={scrollRef} className="max-h-[252px] overflow-y-auto pr-1 space-y-1 scrollbar-hide scroll-smooth">
                    {filteredLiveEntries.length > 0 ? (
                      filteredLiveEntries.map((item, idx) => (
                        <div key={idx} className="grid grid-cols-[50px_140px_60px_60px_100px_100px_1fr_60px] items-center bg-[#F2F2F2]/40 rounded-xl px-3 py-2 text-[11px] hover:bg-white border border-transparent hover:border-gray-200 transition-all group">
                          <div className="font-black text-black">{item.number}</div>
                          <div className="font-bold text-black truncate pr-3">{item.discipline}</div>
                          <div className="font-black text-[#3171af]">{item.score}</div>
                          <div className="text-gray-400 font-bold">{item.place}</div>
                          <div className="truncate pr-3 text-gray-700">{item.judge}</div>
                          <div className="text-gray-500 truncate pr-3">{item.city}</div>
                          <div className="text-gray-400 truncate italic text-[10px] pr-2">{item.comment}</div>
                          <div className="flex justify-end">
                            <button onClick={() => { setModalMedia({ photos: item.photos, number: item.number }); analyzeComments(item.number); }} className="flex items-center gap-1 text-[#3171af] p-1.5 hover:bg-white rounded-lg transition-all">
                              <ImageIcon size={12} /><span className="text-[9px] font-black">{item.photos.length}</span>
                            </button>
                          </div>
                        </div>
                      ))
                    ) : (
                      <div className="py-10 text-center text-[10px] font-bold text-gray-300 uppercase tracking-widest italic">Нет данных</div>
                    )}
                  </div>
                </div>
              </div>
            </div>

            {/* Фильтр по городам */}
            {cities.length > 1 && (
              <div className="flex justify-center">
                 <div className="bg-white rounded-full p-1 border border-gray-200 flex gap-0.5 overflow-x-auto max-w-full scrollbar-hide shadow-sm">
                    {cities.map(city => (
                      <button key={city} onClick={() => setSelectedCity(city)} className={`px-4 py-1.5 rounded-full text-[9px] font-black transition-all whitespace-nowrap ${selectedCity === city ? 'bg-black text-white' : 'text-gray-400 hover:bg-gray-50'}`}>
                        {city}
                      </button>
                    ))}
                 </div>
              </div>
            )}

            {/* Карточки номинаций */}
            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
              {Object.entries(getNominationGroups()).map(([nomination, participants]) => (
                <div key={nomination} className="bg-white rounded-[24px] shadow-sm p-5 border border-gray-100">
                  <div className="mb-3 flex items-center justify-between border-b border-gray-50 pb-3">
                    <h4 className="text-[11px] font-black tracking-tight leading-tight uppercase">{nomination}</h4>
                    <span className="text-[8px] font-black text-[#3171af] bg-blue-50 px-2 py-0.5 rounded-full">{participants.length}</span>
                  </div>
                  <div className="space-y-1.5">
                    {participants.map((p, pIdx) => (
                      <div key={pIdx} className={`flex justify-between items-center px-4 py-3 rounded-[18px] transition-all ${pIdx === 0 ? 'bg-black text-white shadow-xl shadow-black/10' : 'bg-[#F2F2F2]/60'}`}>
                        <div className="flex flex-col">
                          <span className={`text-[11px] font-black ${pIdx === 0 ? 'text-[#3171af]' : 'text-black'}`}>№ {p.number}</span>
                          <span className="text-[8px] opacity-40 font-bold uppercase tracking-tighter">{p.city}</span>
                        </div>
                        <div className="flex items-center gap-1.5 font-black text-[11px]">
                           <Award size={13} className={pIdx === 0 ? 'text-[#3171af]' : 'text-gray-300'} />
                           {pIdx + 1} МЕСТО
                        </div>
                        <div className="text-right">
                          <span className="font-black text-[13px] tracking-tighter">{p.score.toFixed(1)}</span>
                          <span className="text-[7px] block opacity-30 font-bold tracking-widest uppercase -mt-1">БАЛЛ</span>
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
              ))}
            </div>
          </div>

          {/* Модальное окно аналитики */}
          {modalMedia && (
            <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/80 backdrop-blur-sm" onClick={() => { setModalMedia(null); setAiAnalysis(""); setErrorInfo(null); }}>
              <div className="bg-white w-full max-w-lg rounded-[32px] overflow-hidden flex flex-col max-h-[85vh] shadow-2xl border border-white/20" onClick={(e) => e.stopPropagation()}>
                <div className="p-5 flex justify-between items-center border-b border-gray-100">
                  <div className="flex flex-col">
                    <h3 className="text-[10px] font-black uppercase tracking-widest text-[#3171af]">Аналитика</h3>
                    <span className="text-[11px] text-black font-black italic">Участник № {modalMedia.number}</span>
                  </div>
                  <button onClick={() => { setModalMedia(null); setAiAnalysis(""); setErrorInfo(null); }} className="p-2 bg-gray-50 hover:bg-gray-100 rounded-full transition-colors text-black"><X size={20} /></button>
                </div>
                <div className="flex-1 overflow-y-auto p-5 space-y-5 scrollbar-hide">
                  <div className="bg-[#3171af]/5 border border-[#3171af]/10 rounded-2xl p-5 min-h-[90px] flex flex-col justify-center">
                    <div className="flex items-center gap-2 mb-3"><Sparkles size={14} className="text-[#3171af]" /><span className="text-[9px] font-black text-[#3171af] tracking-widest uppercase">AI РЕЗЮМЕ</span></div>
                    {isAnalyzing ? (
                      <div className="flex items-center gap-3 py-1"><Loader2 size={16} className="text-[#3171af] animate-spin" /><span className="text-[11px] text-gray-500 font-medium">Обработка...</span></div>
                    ) : errorInfo ? (
                      <span className="text-[11px] font-bold text-red-500">{errorInfo}</span>
                    ) : (
                      <p className="text-[12px] leading-relaxed italic text-gray-700 font-medium">{aiAnalysis || "Нет комментариев."}</p>
                    )}
                  </div>
                  <div className="grid grid-cols-2 gap-4">
                    {modalMedia.photos.map((url, i) => (
                      <div key={i} className="group relative aspect-[4/5] bg-gray-50 rounded-2xl overflow-hidden border border-gray-100 shadow-sm cursor-pointer" onClick={() => openFullscreen(i)}>
                        <img src={url} alt="" className="w-full h-full object-cover transition-transform group-hover:scale-105" />
                        <div className="absolute inset-0 bg-black/20 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center"><Maximize2 size={24} className="text-white" /></div>
                      </div>
                    ))}
                  </div>
                </div>
              </div>
            </div>
          )}

          {/* Полноэкранный просмотр */}
          {fullscreenImage && (
            <div className="fixed inset-0 z-[60] bg-black flex flex-col items-center justify-center p-4" onClick={() => setFullscreenImage(null)}>
              <div className="absolute top-4 right-4 flex items-center gap-3 z-[70]">
                <a href={fullscreenImage.url} target="_blank" rel="noopener noreferrer" className="bg-white/10 hover:bg-white/20 p-3 rounded-full text-white transition-colors" onClick={(e) => e.stopPropagation()}><Download size={24} /></a>
                <button onClick={(e) => { e.stopPropagation(); setFullscreenImage(null); }} className="bg-white/10 hover:bg-white/20 p-3 rounded-full text-white transition-colors"><X size={24} /></button>
              </div>
              <div className="relative w-full h-full max-w-4xl flex items-center justify-center" onClick={(e) => e.stopPropagation()}>
                {modalMedia?.photos.length > 1 && <button onClick={(e) => navigateFullscreen(e, -1)} className="absolute left-0 z-10 p-4 text-white hover:text-[#3171af] transition-colors"><ChevronLeft size={48} /></button>}
                <img src={fullscreenImage.url} className="max-w-full max-h-full object-contain rounded-sm" alt="Fullscreen" onClick={(e) => e.stopPropagation()} />
                {modalMedia?.photos.length > 1 && <button onClick={(e) => navigateFullscreen(e, 1)} className="absolute right-0 z-10 p-4 text-white hover:text-[#3171af] transition-colors"><ChevronRight size={48} /></button>}
              </div>
              <div className="absolute bottom-10 bg-black/50 backdrop-blur px-6 py-2 rounded-full text-white/70 text-[10px] font-black uppercase tracking-widest">Фото {fullscreenImage.index + 1} из {modalMedia?.photos.length}</div>
            </div>
          )}
        </div>
      );
    }

    // --- Рендеринг приложения ---
    const root = createRoot(document.getElementById('root'));
    root.render(React.createElement(App));
  </script>
</body>
</html>
